    <title>Favicon styling avoiding cors</title>

<body>
    <style>
        body {
            background: rgb(255, 255, 255);
            padding: 0px;
            margin: 0px;
        }

        .card {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 50px;
            height: 50px;
        }

        .gray {
            width: 52px;
            height: 52px;
            position: absolute;
            border-radius: 9px;
            background: #ddd;
            z-index: 1;
        }

        .border {
            background-size: 10000%;
            background-position: 75% 75%;
            width: 52px;
            height: 52px;
            position: absolute;
            border-radius: 9px;
            filter: brightness(0.8);
            opacity: 0.9;
            z-index: 2;
        }
        
        .background {
            width: 50px;
            height: 50px;
            background-size: 10000%;
            background-position: 75% 75%;
            opacity: 0.1;
            filter: brightness(0.5);
            border-radius: 8px;
            position: absolute;
            z-index: 4;
        }

        .white {
            background: #fff;
            width: 50px;
            height: 50px;
            background-size: 10000%;
            background-position: 75% 75%;
            border-radius: 8px;
            position: absolute;
            z-index: 3;
        }

        .icon {
            width: 30px;
            height: 30px;
            background-size: cover;
            background-position: center center;
            position: absolute;
            border-radius: 6px;
            z-index: 5;
        }

        #root {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }
    </style>
